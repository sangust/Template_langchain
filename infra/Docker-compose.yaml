version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - private

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - private
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "qwen3:4b-instruct"]
    networks:
      - private

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: api
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8080:8080"
    networks:
      - private
      - public

networks:
  private:
    driver: bridge
  public:
    driver: bridge

volumes:
  ollama_data: